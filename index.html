<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aaditya Neupane</title>
    <style>
      body { margin: 0; overflow: hidden; }
      #loading-screen {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: #111;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          z-index: 1000;
          color: white;
          font-family: Arial, sans-serif;
      }
      #loading-bar-container {
          width: 50%;
          max-width: 300px;
          height: 20px;
          background: #333;
          margin-top: 20px;
          border-radius: 10px;
          overflow: hidden;
      }
      #loading-bar {
          height: 100%;
          width: 0%;
          background: #4CAF50;
          transition: width 0.3s;
      }
      #loading-text {
          margin-top: 10px;
          font-size: 14px;
      }

      #intro-overlay {
          position: fixed;
          top: 0; left: 0;
          width: 100vw; height: 100vh;
          background: rgba(0, 0, 0, 0.9);
          display: flex;
          justify-content: center;
          align-items: center;
          z-index: 1001;
        }
        #intro-overlay #overlayContent {
          position: relative;
          width: 100%; height: 100%;
          display: flex;
          justify-content: center;
          align-items: center;
        }
        #intro-overlay #overlayFrame {
          width: 100vw;
          height: 100vh;
          border: none;
        }
        #intro-overlay #closeOverlay {
          position: fixed;
          top: 0px;
          right: 0px;
          z-index: 9999;
          padding: 15px 60px;
          background: #db383800;
          color: white;
          border: none;
          border-radius: 5px;
          cursor: pointer;
          font-size: 16px;
          pointer-events: auto;
        }
  </style>
    
  </head>
  <body>
    <div id="root"></div>
    <div id="loading-screen">
      <h1> Loading...</h1>
      <h4>Page Under Construction - Contents Limited</h4>
      <h6> Click on Laptop / CV</h6>
      <div id="loading-bar-container">
          <div id="loading-bar"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>

    <div id="intro-overlay">
      <div id="overlayContent">
        <iframe id="overlayFrame" src="https://aadityane93.github.io/vscode-portfolio"></iframe>
        <button id="closeOverlay" title="Reload, if doesn't work"></button>
      </div>
    </div>
    <script>
      (function() {
        var introOverlay = document.getElementById('intro-overlay');
        var closeBtn = document.getElementById('closeOverlay');
        if (closeBtn && introOverlay) {
          closeBtn.addEventListener('click', function() {
            introOverlay.style.display = 'none';
          });
        }
      })();
    </script>
  </body>
</html>
